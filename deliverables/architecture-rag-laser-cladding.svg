<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Архитектура RAG-системы по лазерной наплавке (CladRAG)</title>
<desc>React SPA общается с FastAPI-шлюзом по REST и SSE. Шлюз ведёт к RAGPipeline для поиска и к очереди arq+Redis с воркером для индексации. Оба пути используют общие зависимости: ChromaDB с MiniLM, SQLite и внешний LLM-эндпоинт через LangChain.</desc>
<style>
  text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .t{font-size:14px;fill:#1a1a1a;}
  .th{font-size:14px;font-weight:500;fill:#1a1a1a;}
  .ts{font-size:12px;fill:#6b6b6b;}
  .box{fill:#f5f5f4;stroke:#d6d3d1;stroke-width:0.5;}
  .c-teal rect,rect.c-teal{fill:#d3eeec;stroke:#5aa9a3;stroke-width:0.5;}
  .c-teal .th{fill:#0f4f4a;} .c-teal .ts{fill:#2b6f69;}
  .c-amber rect,rect.c-amber{fill:#f6e8c8;stroke:#c9a44b;stroke-width:0.5;}
  .c-amber .th{fill:#6b4e10;} .c-amber .ts{fill:#8a6a1f;}
  line{stroke:#6b6b6b;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect class="box" x="190" y="44" width="300" height="50" rx="4"/>
<text class="th" x="340" y="66" text-anchor="middle">React SPA (Vite)</text>
<text class="ts" x="340" y="82" text-anchor="middle">чат · цитаты · библиотека · stats</text>

<rect class="box" x="120" y="128" width="440" height="50" rx="4"/>
<text class="th" x="340" y="150" text-anchor="middle">FastAPI gateway</text>
<text class="ts" x="340" y="166" text-anchor="middle">auth/JWT · REST · SSE-стрим</text>

<rect class="box" x="66" y="212" width="240" height="62" rx="4"/>
<text class="th" x="186" y="240" text-anchor="middle">RAGPipeline</text>
<text class="ts" x="186" y="258" text-anchor="middle">condense → 5-шаг. поиск</text>

<rect class="box" x="374" y="212" width="240" height="62" rx="4"/>
<text class="th" x="494" y="240" text-anchor="middle">arq + Redis</text>
<text class="ts" x="494" y="258" text-anchor="middle">очередь индексации</text>

<rect class="box" x="374" y="312" width="240" height="62" rx="4"/>
<text class="th" x="494" y="340" text-anchor="middle">Worker (Python)</text>
<text class="ts" x="494" y="358" text-anchor="middle">6 этапов конвейера</text>

<rect x="50" y="408" width="580" height="84" rx="6" fill="none" stroke="#a8a29e" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="58" y="422" text-anchor="start">Общие зависимости</text>

<g class="c-teal"><rect x="66" y="430" width="172" height="52" rx="4"/>
<text class="th" x="152" y="452" text-anchor="middle">ChromaDB</text>
<text class="ts" x="152" y="468" text-anchor="middle">MiniLM 384 · HNSW</text></g>

<g class="c-teal"><rect x="254" y="430" width="172" height="52" rx="4"/>
<text class="th" x="340" y="452" text-anchor="middle">SQLite</text>
<text class="ts" x="340" y="468" text-anchor="middle">meta · чат · цитаты</text></g>

<g class="c-amber"><rect x="442" y="430" width="172" height="52" rx="4"/>
<text class="th" x="528" y="452" text-anchor="middle">LLM API</text>
<text class="ts" x="528" y="468" text-anchor="middle">LangChain · base_url</text></g>

<line x1="340" y1="94" x2="340" y2="126" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="114" text-anchor="start">REST + SSE</text>
<line x1="250" y1="178" x2="200" y2="210" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="196" y="200" text-anchor="end">поиск</text>
<line x1="440" y1="178" x2="486" y2="210" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="506" y="200" text-anchor="start">upload</text>
<line x1="494" y1="274" x2="494" y2="310" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="186" y1="274" x2="186" y2="406" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="196" y="345" text-anchor="start">read</text>
<line x1="494" y1="374" x2="494" y2="406" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="504" y="395" text-anchor="start">write</text>

<rect x="66" y="506" width="11" height="11" rx="2" class="c-teal"/>
<text class="ts" x="83" y="515" text-anchor="start">хранилище</text>
<rect x="180" y="506" width="11" height="11" rx="2" class="c-amber"/>
<text class="ts" x="197" y="515" text-anchor="start">внешний LLM-эндпоинт (OpenAI-совместимый)</text>
</svg>
