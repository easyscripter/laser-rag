name: laserrag

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - laserrag

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - laserrag

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laserrag

  api:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - uploads_data:${UPLOAD_DIR:-/data/uploads}
    networks:
      - laserrag

  worker:
    build:
      context: ./backend
    command: ["arq", "app.worker.WorkerSettings"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - uploads_data:${UPLOAD_DIR:-/data/uploads}
    networks:
      - laserrag

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - laserrag

volumes:
  postgres_data:
  chroma_data:
  uploads_data:

networks:
  laserrag:
    driver: bridge
